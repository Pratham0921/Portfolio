<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  <text x="400" y="50" text-anchor="middle" fill="#00d4ff" font-family="Fira Code, monospace" font-size="20">Behavior Tree Structure</text>

  <g font-family="Fira Code, monospace">
    <!-- Root -->
    <rect x="350" y="30" width="100" height="50" fill="none" stroke="#00d4ff" stroke-width="2" rx="6" />
    <text x="400" y="55" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="bold">Selector</text>
    <text x="400" y="75" text-anchor="middle" fill="#666" font-size="9">Root</text>

    <!-- Children branches -->
    <rect x="200" y="120" width="120" height="50" fill="none" stroke="#00d4ff" stroke-width="2" rx="6" />
    <text x="260" y="145" text-anchor="middle" fill="#00d4ff" font-size="12">Sequence</text>
    <text x="260" y="165" text-anchor="middle" fill="#666" font-size="9">Combat</text>

    <rect x="480" y="120" width="120" height="50" fill="none" stroke="#00d4ff" stroke-width="2" rx="6" />
    <text x="540" y="145" text-anchor="middle" fill="#00d4ff" font-size="12">Sequence</text>
    <text x="540" y="165" text-anchor="middle" fill="#666" font-size="9">Patrol</text>

    <rect x="340" y="220" width="120" height="50" fill="none" stroke="#00d4ff" stroke-width="2" rx="6" />
    <text x="400" y="245" text-anchor="middle" fill="#00d4ff" font-size="12">Parallel</text>
    <text x="400" y="265" text-anchor="middle" fill="#666" font-size="9">Awareness</text>

    <!-- Leaf nodes -->
    <rect x="120" y="240" width="100" height="40" fill="none" stroke="#666" stroke-width="1" rx="4" />
    <text x="170" y="260" text-anchor="middle" fill="#a0a0a0" font-size="10">BB Key</text>
    <text x="170" y="275" text-anchor="middle" fill="#666" font-size="9">IsInCombat</text>

    <rect x="580" y="240" width="100" height="40" fill="none" stroke="#666" stroke-width="1" rx="4" />
    <text x="630" y="260" text-anchor="middle" fill="#a0a0a0" font-size="10">BB Key</text>
    <text x="630" y="275" text-anchor="middle" fill="#666" font-size="9">HasTarget</text>

    <rect x="250" y="320" width="100" height="40" fill="none" stroke="#666" stroke-width="1" rx="4" />
    <text x="300" y="340" text-anchor="middle" fill="#a0a0a0" font-size="10">Service</text>
    <text x="300" y="355" text-anchor="middle" fill="#666" font-size="9">Update</text>

    <rect x="450" y="320" width="100" height="40" fill="none" stroke="#666" stroke-width="1" rx="4" />
    <text x="500" y="340" text-anchor="middle" fill="#a0a0a0" font-size="10">Decorator</text>
    <text x="500" y="355" text-anchor="middle" fill="#666" font-size="9">IsPlayerVisible</text>
  </g>

  <!-- Connectors -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none">
    <path d="M 300 80 L 300 120" />
    <path d="M 500 80 L 500 120" />
    <path d="M 400 170 L 400 220" />
    <path d="M 260 170 L 170 240" />
    <path d="M 540 170 L 630 240" />
    <path d="M 400 270 L 300 320" />
    <path d="M 400 270 L 500 320" />
  </g>

  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff" />
    </marker>
  </defs>

  <g stroke="#00d4ff" stroke-width="1" marker-end="url(#arrow4)" fill="none">
    <path d="M 300 80 L 300 120" />
    <path d="M 500 80 L 500 120" />
    <path d="M 400 170 L 400 220" />
    <path d="M 260 170 L 170 240" />
    <path d="M 540 170 L 630 240" />
    <path d="M 400 270 L 300 320" />
    <path d="M 400 270 L 500 320" />
  </g>

  <text x="400" y="380" text-anchor="middle" fill="#666" font-family="Fira Code, monospace" font-size="10">
    Total nodes: 200+ | Decorators: 12 | Services: 5
  </text>
</svg>