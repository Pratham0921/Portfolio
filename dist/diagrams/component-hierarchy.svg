<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  <text x="400" y="50" text-anchor="middle" fill="#00d4ff" font-family="Fira Code, monospace" font-size="20">Component Hierarchy</text>

  <!-- Root Component -->
  <rect x="350" y="80" width="100" height="40" fill="none" stroke="url(#accent)" stroke-width="2" rx="4" />
  <text x="400" y="105" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">Player</text>

  <!-- Child Components -->
  <rect x="200" y="160" width="120" height="40" fill="none" stroke="#00d4ff" stroke-width="2" rx="4" />
  <text x="260" y="185" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">WeaponComponent</text>

  <rect x="480" y="160" width="120" height="40" fill="none" stroke="#00d4ff" stroke-width="2" rx="4" />
  <text x="540" y="185" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">HealthComponent</text>

  <rect x="200" y="260" width="120" height="40" fill="none" stroke="#00d4ff" stroke-width="2" rx="4" />
  <text x="260" y="285" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">MovementComponent</text>

  <rect x="480" y="260" width="120" height="40" fill="none" stroke="#00d4ff" stroke-width="2" rx="4" />
  <text x="540" y="285" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">InventoryComponent</text>

  <!-- Connecting lines -->
  <line x1="400" y1="120" x2="260" y2="160" stroke="#00d4ff" stroke-width="1" />
  <line x1="400" y1="120" x2="540" y2="160" stroke="#00d4ff" stroke-width="1" />
  <line x1="260" y1="200" x2="260" y2="260" stroke="#00d4ff" stroke-width="1" />
  <line x1="540" y1="200" x2="540" y2="260" stroke="#00d4ff" stroke-width="1" />

  <text x="400" y="370" text-anchor="middle" fill="#666" font-family="Fira Code, monospace" font-size="10">Composition over inheritance</text>
</svg>