<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  <text x="400" y="50" text-anchor="middle" fill="#00d4ff" font-family="Fira Code, monospace" font-size="20">State Machine Flowchart</text>

  <!-- States -->
  <g transform="translate(150, 100)">
    <!-- Idle -->
    <rect x="0" y="0" width="120" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="60" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">Idle</text>

    <!-- Patrol -->
    <rect x="190" y="-60" width="120" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="250" y="-25" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">Patrol</text>

    <!-- Chase -->
    <rect x="190" y="60" width="120" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="250" y="95" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">Chase</text>

    <!-- Combat -->
    <rect x="430" y="0" width="120" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="490" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Fira Code, monospace" font-size="12">Combat</text>

    <!-- Dead -->
    <rect x="670" y="0" width="120" height="60" fill="none" stroke="#666" stroke-width="2" rx="8" />
    <text x="730" y="35" text-anchor="middle" fill="#a0a0a0" font-family="Fira Code, monospace" font-size="12">Dead</text>
  </g>

  <!-- Transitions -->
  <g stroke="#00d4ff" stroke-width="2" fill="none">
    <!-- Idle -> Patrol -->
    <path d="M 210 100 L 210 70" marker-end="url(#arrowhead)" />
    <text x="180" y="85" fill="#00d4ff" font-family="Fira Code, monospace" font-size="10">Player seen</text>

    <!-- Patrol -> Chase -->
    <path d="M 310 70 L 250 70 L 250 100" marker-end="url(#arrowhead)" />

    <!-- Chase -> Combat -->
    <path d="M 370 100 L 430 100" marker-end="url(#arrowhead)" />
    <text x="400" y="115" text-anchor="middle" fill="#00d4ff" font-family="Fira Code, monospace" font-size="10">In range</text>

    <!-- Any -> Dead -->
    <path d="M 490 60 L 730 30" marker-end="url(#arrowhead)" />
    <text x="610" y="20" fill="#666" font-family="Fira Code, monospace" font-size="10">Health ≤ 0</text>

    <!-- Combat -> Chase -->
    <path d="M 430 60 L 250 100" marker-end="url(#arrowhead)" />
    <text x="340" y="80" fill="#00d4ff" font-family="Fira Code, monospace" font-size="10">Target lost</text>

    <!-- Chase -> Patrol -->
    <path d="M 250 130 L 310 130" marker-end="url(#arrowhead)" />
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff" />
    </marker>
  </defs>

  <text x="400" y="350" text-anchor="middle" fill="#666" font-family="Fira Code, monospace" font-size="10">All states except Dead can transition to Dead on Health ≤ 0</text>
</svg>