<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  <text x="400" y="50" text-anchor="middle" fill="#00d4ff" font-family="Fira Code, monospace" font-size="20">Procedural Generation Flow</text>

  <!-- Process Steps -->
  <g font-family="Fira Code, monospace">
    <!-- Step 1 -->
    <rect x="50" y="80" width="150" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="125" y="105" text-anchor="middle" fill="#e0e0e0" font-size="12">Input Seed</text>
    <text x="125" y="125" text-anchor="middle" fill="#666" font-size="10">MaxDungeonSize,</text>
    <text x="125" y="137" text-anchor="middle" fill="#666" font-size="10">RoomCount, etc.</text>

    <!-- Step 2 -->
    <rect x="325" y="80" width="150" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="400" y="105" text-anchor="middle" fill="#e0e0e0" font-size="12">BSP Split</text>
    <text x="400" y="125" text-anchor="middle" fill="#666" font-size="10">Binary Space</text>
    <text x="400" y="137" text-anchor="middle" fill="#666" font-size="10">Partitioning</text>

    <!-- Step 3 -->
    <rect x="600" y="80" width="150" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="675" y="105" text-anchor="middle" fill="#e0e0e0" font-size="12">Room Gen</text>
    <text x="675" y="125" text-anchor="middle" fill="#666" font-size="10">Create rooms</text>
    <text x="675" y="137" text-anchor="middle" fill="#666" font-size="10">from leaves</text>

    <!-- Step 4 -->
    <rect x="50" y="230" width="150" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="125" y="255" text-anchor="middle" fill="#e0e0e0" font-size="12">Corridors</text>
    <text x="125" y="275" text-anchor="middle" fill="#666" font-size="10">Minimum Spanning</text>
    <text x="125" y="287" text-anchor="middle" fill="#666" font-size="10">Tree connection</text>

    <!-- Step 5 -->
    <rect x="325" y="230" width="150" height="60" fill="none" stroke="#00d4ff" stroke-width="2" rx="8" />
    <text x="400" y="255" text-anchor="middle" fill="#e0e0e0" font-size="12">Placement</text>
    <text x="400" y="275" text-anchor="middle" fill="#666" font-size="10">Doors, traps,</text>
    <text x="400" y="287" text-anchor="middle" fill="#666" font-size="10">treasure</text>

    <!-- Step 6 -->
    <rect x="600" y="230" width="150" height="60" fill="none" stroke="emerald" stroke-width="2" rx="8" />
    <text x="675" y="255" text-anchor="middle" fill="#10b981" font-size="12">Output</text>
    <text x="675" y="275" text-anchor="middle" fill="#666" font-size="10">Validated</text>
    <text x="675" y="287" text-anchor="middle" fill="#666" font-size="10">Dungeon</text>
  </g>

  <!-- Arrows -->
  <g stroke="#00d4ff" stroke-width="2" fill="none">
    <path d="M 200 110 L 325 110" marker-end="url(#arrow3)" />
    <path d="M 475 110 L 600 110" marker-end="url(#arrow3)" />
    <path d="M 200 230 L 325 230" marker-end="url(#arrow3)" />
    <path d="M 475 230 L 600 230" marker-end="url(#arrow3)" />

    <!-- Cross connections -->
    <path d="M 325 140 L 325 210" stroke-dasharray="4,4" />
    <path d="M 350 140 L 350 190" stroke-dasharray="4,4" />

    <path d="M 475 140 L 475 190" stroke-dasharray="4,4" />
    <path d="M 500 140 L 500 190" stroke-dasharray="4,4" />
  </g>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff" />
    </marker>
  </defs>

  <text x="400" y="350" text-anchor="middle" fill="#666" font-family="Fira Code, monospace" font-size="10">
    Seeded generation ensures reproducible dungeons
  </text>
</svg>